<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Deteksi Penyakit Daun Apel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: #0f1115;
            min-height: 100vh;
        }

        .card {
            background: #1a1d23;
            border: 1px solid #2a2f3a;
            color: white;
            border-radius: 15px;
        }

        .form-control {
            background: #12151b;
            border: 1px solid #2a2f3a;
            color: white;
            font-size: 18px;
            padding: 12px;
        }

        .form-control::file-selector-button {
            background: #1db954;
            color: white;
            border: none;
            padding: 12px 16px;
            margin: -12px 12px -12px -12px;
            height: calc(100% + 24px);
        }

        .btn-success {
            background: #1db954;
            border: none;
        }

        .btn-success:hover {
            background: #17a74a;
        }

        .text-success {
            color: #1db954 !important;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .form-label {
            color: #d1d1d1;
            font-size: 18px;
        }

        /* Style khusus tombol History & Statistik */
        .btn-outline-nav {
            background: #12151b;
            border: 1px solid #2a2f3a;
            color: #d1d1d1;
        }

        .btn-outline-nav:hover {
            background: #1db954;
            border-color: #1db954;
            color: white;
        }

        /* Perbesar tampilan umum */
        h2 {
            font-size: 32px;
        }

        p {
            font-size: 17px;
        }

        .btn-lg {
            font-size: 20px;
            padding: 14px;
        }

        .btn-outline-nav.btn-sm {
            font-size: 16px;
            padding: 10px 20px;
        }


        /* Responsive HP -> dibuat full & lebih besar */
        @media (max-width: 576px) {

            .container {
                padding-left: 0;
                padding-right: 0;
            }

            body {
                display: flex;
                align-items: center;
                min-height: 100vh;
            }

            .card {
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            h2 {
                font-size: 26px;
            }

            p {
                font-size: 16px;
            }

            .btn-lg {
                font-size: 18px;
            }

            .form-control {
                font-size: 16px;
            }

        }


        /* Perbesar tampilan Desktop */
        @media (min-width: 992px) {

            .card {
                padding: 60px !important;
            }

            h2 {
                font-size: 38px;
            }

            p {
                font-size: 19px;
            }

        }

    </style>

</head>


<body>


<div class="container-fluid">


    <div class="row justify-content-center mt-4 mt-md-5">


        <div class="col-12 col-sm-10 col-md-8 col-lg-6">


            <div class="card shadow p-4 p-md-5">


                <h2 class="text-center text-success">
                    🍎 Deteksi Penyakit Daun Apel
                </h2>


                <p class="text-center text-muted mb-4">
                    Klasifikasi penyakit daun apel menggunakan CNN
                </p>


                <!-- Tombol History & Statistik -->
                <div class="d-flex justify-content-center gap-2 mb-4">

                    <a href="/history" class="btn btn-outline-nav btn-sm px-3">
                        📁 History
                    </a>

                    <a href="/statistics" class="btn btn-outline-nav btn-sm px-3">
                        📊 Statistik
                    </a>

                </div>
                <!-- End Tombol History & Statistik -->



                {% if error %}

                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>

                {% endif %}



                <form action="/predict"
                      method="POST"
                      enctype="multipart/form-data">


                    <div class="mb-4">


                        <label class="form-label">
                            Upload gambar daun
                        </label>


                        <input
                            class="form-control"
                            type="file"
                            name="image"
                            accept="image/*"
                            required>


                    </div>



                    <div class="d-grid">


                        <button class="btn btn-success btn-lg">

                            Prediksi

                        </button>


                    </div>


                </form>


            </div>


        </div>


    </div>


</div>


</body>
</html>
