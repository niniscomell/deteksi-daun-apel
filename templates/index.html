<!DOCTYPE html>
<html>
<head>
    <title>Deteksi Penyakit Daun Apel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #0f1115;
        }

        .card {
            background: #1a1d23;
            border: 1px solid #2a2f3a;
            color: white;
            border-radius: 15px;
        }

        .form-control {
            background: #12151b;
            border: 1px solid #2a2f3a;
            color: white;
        }

        .form-control::file-selector-button {
            background: #1db954;
            color: white;
            border: none;
        }

        .btn-success {
            background: #1db954;
            border: none;
        }

        .btn-success:hover {
            background: #17a74a;
        }

        .text-success {
            color: #1db954 !important;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .form-label {
            color: #d1d1d1;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-6">

            <div class="card shadow p-5">

                <h2 class="text-center text-success">
                    🍎 Deteksi Penyakit Daun Apel
                </h2>

                <p class="text-center text-muted mb-4">
                    Klasifikasi penyakit daun apel menggunakan CNN
                </p>

                <!-- ✔ TAMBAHAN: menampilkan pesan error jika ada -->
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <form action="/predict"
                      method="POST"
                      enctype="multipart/form-data">

                    <div class="mb-4">

                        <label class="form-label">
                            Upload gambar daun
                        </label>

                        <input
                            class="form-control"
                            type="file"
                            name="image"
                            required>

                    </div>

                    <div class="d-grid">

                        <button class="btn btn-success btn-lg">

                            Prediksi

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
