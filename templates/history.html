<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Riwayat Prediksi
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {

            background: #0f1115;

            min-height: 100vh;

        }

        .card {

            background: #1a1d23;

            border: 1px solid #2a2f3a;

            color: white;

            border-radius: 15px;

        }

        h2, h3, h5 {

            color: white;

        }

        .text-muted {

            color: #a0a0a0 !important;

        }

        .text-success {

            color: #1db954 !important;

        }

        .prediction-image {

            width: 300px;

            max-width: 100%;

            height: auto;

            object-fit: cover;

            border-radius: 8px;

        }

        .btn-success {

            background: #1db954;

            border: none;

        }

        .btn-success:hover {

            background: #17a74a;

        }

        .btn-danger {

            border: none;

        }

        .btn-danger:hover {

            opacity: 0.9;

        }

        @media (max-width:576px){

            .container {

                padding-left: 12px;

                padding-right: 12px;

            }

            h2 {

                font-size: 24px;

            }

            h3 {

                font-size: 22px;

            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center mt-4 mt-md-5">

        <div class="col-11 col-sm-8 col-md-7">

            <div class="text-center mb-4">

                <h2 class="text-success">

                    📋 Riwayat Prediksi

                </h2>

                <p class="text-muted">

                    Daftar hasil deteksi penyakit daun apel sebelumnya

                </p>

            </div>

            {% if data %}

                {% for item in data %}

                <div class="card shadow p-4 mb-4">

                    <div class="text-center">

                        <img
                            src="/static/uploads/{{ item.gambar }}"
                            class="prediction-image shadow">

                    </div>

                    <h3 class="text-center mt-4 text-success">

                        {{ item.hasil }}

                    </h3>

                    <h5 class="text-center">

                        Tingkat Keyakinan :
                        {{ item.confidence }} %

                    </h5>

                    <p class="text-center text-muted mt-3">

                        {{ item.tanggal }}

                    </p>

                    <div class="d-grid mt-3">

                        <a href="/delete/{{ item.id }}"
                           class="btn btn-danger">

                            🗑 Hapus

                        </a>

                    </div>

                </div>

                {% endfor %}

            {% else %}

                <div class="card shadow p-4 text-center">

                    <p class="text-muted mb-0">

                        Belum ada riwayat prediksi.

                    </p>

                </div>

            {% endif %}

            <div class="d-grid mt-4">

                <a href="/"
                   class="btn btn-success btn-lg">

                    Prediksi Lagi

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
