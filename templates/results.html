<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Hasil Prediksi</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <style>


        body {

            background: linear-gradient(135deg, #0f0f0f, #0f3d2e, #1db954);

            min-height: 100vh;

        }



        .card {

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.15);

            backdrop-filter: blur(10px);

            color: white;

            border-radius: 15px;

        }



        .alert {

            background: rgba(255, 255, 255, 0.08);

            color: white;

            border: 1px solid rgba(255, 255, 255, 0.2);

        }



        h2, h3, h5 {

            color: white;

        }



        .btn-success {

            background: #1db954;

            border: none;

        }



        .btn-success:hover {

            background: #17a74a;

        }



        .hasil-gambar {

            width: 300px;

            max-width: 100%;

            height: auto;

            object-fit: cover;

        }



        @media (max-width: 576px) {


            .container {

                padding-left: 12px;

                padding-right: 12px;

            }



            h2 {

                font-size: 24px;

            }



            h3 {

                font-size: 22px;

            }



            h5 {

                font-size: 16px;

            }


        }


    </style>


</head>



<body>



<div class="container">



    <div class="row justify-content-center mt-4 mt-md-5">



        <div class="col-11 col-sm-8 col-md-7">



            <div class="card shadow p-4 p-md-5">



                <h2 class="text-center mb-4">

                    Hasil Prediksi

                </h2>




                <div class="text-center">


                    <img src="{{ gambar }}"

                         class="rounded shadow hasil-gambar">


                </div>



                <br>



                <h3 class="text-center">

                    {{ hasil }}

                </h3>




                <h5 class="text-center">

                    Tingkat Keyakinan : {{ confidence }} %

                </h5>




                <div class="alert mt-4">


                    {{ deskripsi }}


                </div>




                <div class="d-grid mt-3">



                    <a href="/" class="btn btn-success">

                        Prediksi Lagi


                    </a>



                </div>



            </div>



        </div>



    </div>



</div>



</body>

</html>
